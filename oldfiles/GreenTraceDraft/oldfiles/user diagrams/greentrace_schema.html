
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#4a4a46' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram

  user {
    int id PK
    varchar username
    varchar email
    varchar password_hash
    enum role
    enum status
    datetime created_at
  }

  company_profile {
    int id PK
    int user_id FK
    varchar legal_name
    varchar nipt
    varchar address
    varchar cert_file_path
    enum status
  }

  tender {
    int id PK
    int created_by FK
    varchar title
    varchar location
    decimal budget
    date submission_deadline
    enum status
    datetime created_at
  }

  eco_milestone {
    int id PK
    int tender_id FK
    varchar title
    enum evidence_type
    decimal weight
    date deadline
  }

  bid_application {
    int id PK
    int tender_id FK
    int company_id FK
    varchar proposal_path
    decimal financial_amount
    enum status
    decimal evaluation_score
  }

  project {
    int id PK
    int tender_id FK
    int company_id FK
    int admin_id FK
    enum risk_level
    enum status
    date start_date
    date end_date
  }

  milestone_submission {
    int id PK
    int project_id FK
    int milestone_id FK
    int submitted_by FK
    varchar file_path
    varchar gps_lat
    varchar gps_lng
    enum status
    text rejection_reason
    datetime submitted_at
  }

  eco_score {
    int id PK
    int project_id FK
    int company_id FK
    decimal total_score
    decimal milestone_score
    decimal carbon_score
    datetime last_updated
  }

  violation_alert {
    int id PK
    int project_id FK
    int milestone_id FK
    enum alert_type
    text message
    datetime triggered_at
  }

  whistleblow_report {
    int id PK
    int project_id FK
    int reporter_id FK
    bool is_anonymous
    text description
    varchar evidence_path
    enum status
    datetime submitted_at
  }

  audit_log {
    int id PK
    int user_id FK
    int project_id FK
    varchar action
    varchar entity_type
    text old_value
    text new_value
    datetime created_at
  }

  user ||--o{ company_profile : "has"
  user ||--o{ tender : "creates"
  user ||--o{ milestone_submission : "submits"
  user ||--o{ whistleblow_report : "files"
  user ||--o{ audit_log : "triggers"

  company_profile ||--o{ bid_application : "submits"
  company_profile ||--o{ project : "assigned to"
  company_profile ||--o{ eco_score : "scored in"

  tender ||--o{ eco_milestone : "has"
  tender ||--o{ bid_application : "receives"
  tender ||--|| project : "becomes"

  project ||--o{ milestone_submission : "tracks"
  project ||--o{ eco_score : "scored by"
  project ||--o{ violation_alert : "triggers"
  project ||--o{ whistleblow_report : "flagged by"
  project ||--o{ audit_log : "logged in"

  eco_milestone ||--o{ milestone_submission : "fulfilled by"
  eco_milestone ||--o{ violation_alert : "triggers"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
